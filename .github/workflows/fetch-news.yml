name: Fetch Crypto News Daily Digest

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-and-summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run fetch and summarize script
        run: python scripts/fetch_news.py

      - name: Reclassify existing articles
        run: python scripts/reclassify_existing.py

      - name: Commit and push updated data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/news.json
          git diff --cached --quiet || git commit -m "chore: update news digest $(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M JST')"
          git push
