<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#111110" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>暗号資産ニュース ダイジェスト</title>
<style>
:root {
  --bg: #f5f5f3;
  --surface: #ffffff;
  --surface2: #efefed;
  --border: rgba(0,0,0,0.09);
  --border2: rgba(0,0,0,0.16);
  --text-1: #111;
  --text-2: #555;
  --text-3: #888;
  --accent: #1d4ed8;
  --accent-bg: #eff6ff;
  --accent-border: #bfdbfe;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111110;
    --surface: #1c1c1b;
    --surface2: #252524;
    --border: rgba(255,255,255,0.09);
    --border2: rgba(255,255,255,0.18);
    --text-1: #f0ede8;
    --text-2: #a8a49e;
    --text-3: #6e6a64;
    --accent: #60a5fa;
    --accent-bg: #1e3a5f;
    --accent-border: #1e40af;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  background:var(--bg);color:var(--text-1);
  min-height:100vh;-webkit-text-size-adjust:100%;
}

/* ── HEADER ── */
.header{
  position:sticky;top:0;z-index:200;
  background:rgba(255,255,255,0.88);
  -webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);
  border-bottom:0.5px solid var(--border);
  padding:12px 14px 0;
  padding-top:calc(12px + env(safe-area-inset-top, 0px));
}
@media(prefers-color-scheme:dark){
  .header{background:rgba(17,17,16,0.88)}
}
.header-row1{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.site-title{font-size:16px;font-weight:700;color:var(--text-1);letter-spacing:-.3px;line-height:1.2}
.site-sub{font-size:11px;color:var(--text-3);margin-top:2px}
.refresh-btn{
  display:flex;align-items:center;gap:5px;
  padding:7px 13px;
  background:var(--surface2);
  border:0.5px solid var(--border2);
  border-radius:20px;
  font-size:13px;font-weight:500;color:var(--text-1);
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  transition:opacity .15s;
}
.refresh-btn:active{opacity:.6}
.refresh-btn.loading{opacity:.45;pointer-events:none}
.spin{display:inline-block;font-size:14px}
.spin.go{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── タブバー ── */
.tabs-wrap{
  display:flex;gap:6px;overflow-x:auto;
  scrollbar-width:none;-ms-overflow-style:none;
  padding-bottom:10px;
}
.tabs-wrap::-webkit-scrollbar{display:none}
.tab{
  padding:6px 13px;border-radius:20px;
  font-size:13px;font-weight:500;white-space:nowrap;
  cursor:pointer;border:0.5px solid var(--border);
  background:var(--surface2);color:var(--text-2);
  transition:background .15s,color .15s,border-color .15s;
  flex-shrink:0;
}
.tab.active{
  background:var(--accent);color:#fff;
  border-color:var(--accent);
}

/* ── MAIN ── */
.main{padding:12px 12px calc(80px + var(--safe-bottom));max-width:720px;margin:0 auto}

/* ── ステータス ── */
.status-bar{
  display:flex;align-items:center;gap:8px;
  padding:9px 12px;
  background:var(--surface2);
  border:0.5px solid var(--border);
  border-radius:var(--radius-sm);
  font-size:12px;color:var(--text-3);
  margin-bottom:12px;min-height:38px;
}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:#22c55e}
.dot.loading{background:#f59e0b;animation:pulse 1s infinite}
.dot.error{background:#ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ── フィルターチップ群 ── */
.filter-row{
  display:flex;flex-wrap:wrap;gap:6px;
  margin-bottom:12px;
}
.chip{
  display:flex;align-items:center;gap:5px;
  padding:5px 10px;border-radius:20px;
  font-size:12px;font-weight:500;cursor:pointer;
  border:0.5px solid var(--border);
  background:var(--surface);color:var(--text-2);
  transition:all .15s;flex-shrink:0;
}
.chip.active{border-color:currentColor;opacity:1}
.chip.inactive{opacity:.42}
.chip-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── カウント ── */
.count-bar{font-size:13px;color:var(--text-3);margin-bottom:10px;padding:0 2px}
.count-bar strong{color:var(--text-1);font-weight:600}

/* ── カードリスト ── */
.news-list{display:flex;flex-direction:column;gap:10px}

/* ── ニュースカード ── */
.card{
  background:var(--surface);
  border:0.5px solid var(--border);
  border-radius:var(--radius-lg);
  padding:14px 15px;
  transition:border-color .15s;
}
.card:active{border-color:var(--border2)}

.card-tags{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}

/* ソースバッジ */
.source-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 8px;border-radius:6px;
  font-size:11px;font-weight:600;letter-spacing:.2px;
  white-space:nowrap;border:0.5px solid;
}
/* カテゴリタグ */
.cat-tag{
  display:inline-block;
  padding:3px 8px;border-radius:6px;
  font-size:11px;font-weight:500;
  background:var(--surface2);
  color:var(--text-2);
  border:0.5px solid var(--border);
  white-space:nowrap;
}

.card-title{
  font-size:15px;font-weight:600;line-height:1.5;
  color:var(--text-1);text-decoration:none;
  display:block;margin-bottom:6px;letter-spacing:-.2px;
}
.card-title:visited{color:var(--text-2)}

.card-meta{
  font-size:11px;color:var(--text-3);
  margin-bottom:9px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;
}
.sep{opacity:.35}

.card-summary{
  font-size:13.5px;line-height:1.75;color:var(--text-2);
}

.read-link{
  display:inline-flex;align-items:center;gap:3px;
  margin-top:9px;font-size:12.5px;font-weight:500;
  color:var(--accent);text-decoration:none;
}

/* ── スケルトン ── */
.skel-card{
  background:var(--surface);border:0.5px solid var(--border);
  border-radius:var(--radius-lg);padding:14px 15px;margin-bottom:10px;
}
.skel{
  background:linear-gradient(90deg,var(--surface2) 25%,var(--border2) 50%,var(--surface2) 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite;
  border-radius:5px;
}
@keyframes shimmer{to{background-position:-200% 0}}

/* ── 空・エラー ── */
.empty{text-align:center;padding:56px 20px;color:var(--text-3)}
.empty-icon{font-size:44px;margin-bottom:10px}
.empty-ttl{font-size:15px;font-weight:600;color:var(--text-2);margin-bottom:5px}
.empty-sub{font-size:13px;line-height:1.6}

.err-card{
  padding:12px 14px;border-radius:var(--radius-md);
  background:#fef2f2;border:0.5px solid #ef4444;
  color:#991b1b;font-size:13px;margin-bottom:12px;
  line-height:1.6;
}
@media(prefers-color-scheme:dark){
  .err-card{background:#450a0a;border-color:#b91c1c;color:#fca5a5}
}

/* ── フッター ── */
.footer{
  text-align:center;font-size:11px;color:var(--text-3);
  margin-top:20px;padding-top:16px;
  border-top:0.5px solid var(--border);
  line-height:1.8;
}
.footer a{color:var(--accent);text-decoration:none}

/* ── トップに戻るボタン ── */
.to-top{
  position:fixed;
  bottom:calc(24px + var(--safe-bottom));
  right:16px;
  width:44px;height:44px;border-radius:50%;
  background:var(--surface);
  border:0.5px solid var(--border2);
  box-shadow:0 2px 10px rgba(0,0,0,.12);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;
  opacity:0;pointer-events:none;
  transition:opacity .2s;z-index:100;
}
.to-top.show{opacity:1;pointer-events:auto}
</style>
</head>
<body>

<div class="header">
  <div class="header-row1">
    <div>
      <div class="site-title">暗号資産ニュース ダイジェスト</div>
      <div class="site-sub" id="headerSub">読み込み中...</div>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadNews()">
      <span class="spin" id="spinIcon">↻</span> 更新
    </button>
  </div>

  <!-- 期間タブ -->
  <div class="tabs-wrap" id="periodTabs">
    <div class="tab active" data-period="24h"  onclick="setPeriod('24h')">過去24時間</div>
    <div class="tab"        data-period="today" onclick="setPeriod('today')">今日</div>
    <div class="tab"        data-period="week"  onclick="setPeriod('week')">今週</div>
    <div class="tab"        data-period="all"   onclick="setPeriod('all')">すべて</div>
  </div>
</div>

<div class="main">
  <!-- ステータスバー -->
  <div class="status-bar">
    <div class="dot loading" id="statusDot"></div>
    <span id="statusText">データを読み込んでいます...</span>
  </div>

  <!-- ソースフィルターチップ -->
  <div class="filter-row" id="sourceChips" style="display:none"></div>

  <!-- エラー表示 -->
  <div id="errorArea"></div>

  <!-- スケルトン -->
  <div id="skeletons">
    <div class="skel-card">
      <div class="skel" style="width:90px;height:20px;margin-bottom:10px"></div>
      <div class="skel" style="width:100%;height:16px;margin-bottom:6px"></div>
      <div class="skel" style="width:70%;height:16px;margin-bottom:12px"></div>
      <div class="skel" style="width:100%;height:13px;margin-bottom:5px"></div>
      <div class="skel" style="width:85%;height:13px"></div>
    </div>
    <div class="skel-card">
      <div class="skel" style="width:80px;height:20px;margin-bottom:10px"></div>
      <div class="skel" style="width:100%;height:16px;margin-bottom:6px"></div>
      <div class="skel" style="width:60%;height:16px;margin-bottom:12px"></div>
      <div class="skel" style="width:100%;height:13px;margin-bottom:5px"></div>
      <div class="skel" style="width:75%;height:13px"></div>
    </div>
  </div>

  <!-- 件数表示 -->
  <div class="count-bar" id="countBar" style="display:none"></div>

  <!-- 記事リスト -->
  <div class="news-list" id="newsList"></div>

  <!-- フッター -->
  <div class="footer" id="footer" style="display:none"></div>
</div>

<div class="to-top" id="toTop" onclick="scrollTo({top:0,behavior:'smooth'})">↑</div>

<script>
// ── 設定 ────────────────────────────────────────────────────────────────
// GitHub Pages から取得する news.json のパス
// リポジトリの構成に合わせて変更してください
const NEWS_JSON = './data/news.json';

// GitHub リポジトリ URL（READMEリンク用）
const REPO_URL  = 'https://github.com/Hirotamaw/crypto-news-digest';

// ── ソース定義（スクリプト側でも色を保持）───────────────────────────────
const SOURCE_META = {
  'NADA NEWS'       : { color:'#0f6e56', bg:'#e1f5ee', border:'#9fe1cb' },
  'CoinPost'        : { color:'#1d4ed8', bg:'#eff6ff', border:'#bfdbfe' },
  'あたらしい経済'  : { color:'#7c3aed', bg:'#f5f3ff', border:'#ddd6fe' },
  'CoinTelegraph JP': { color:'#b45309', bg:'#fffbeb', border:'#fde68a' },
};
function sourceMeta(name){
  return SOURCE_META[name] || {color:'#555',bg:'#f0f0f0',border:'#ccc'};
}

// ダークモード判定
const isDark = () => window.matchMedia('(prefers-color-scheme:dark)').matches;

// ── 状態 ────────────────────────────────────────────────────────────────
let allArticles   = [];
let currentPeriod = '24h';
let activeSource  = null;   // null = 全ソース

// ── 日時ユーティリティ ───────────────────────────────────────────────────
const JST_OFFSET = 9 * 3600 * 1000;

function toJST(isoStr){ return isoStr ? new Date(isoStr) : null }

function fmtFull(d){
  if(!d) return '不明';
  return d.toLocaleString('ja-JP',{timeZone:'Asia/Tokyo',
    year:'numeric',month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
}
function fmtRel(d){
  if(!d) return '';
  const diff = Date.now() - d.getTime();
  const m = Math.floor(diff/60000);
  const h = Math.floor(diff/3600000);
  if(m < 1)  return 'たった今';
  if(m < 60) return `${m}分前`;
  if(h < 24) return `${h}時間前`;
  return d.toLocaleString('ja-JP',{timeZone:'Asia/Tokyo',month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
}

// ── 期間フィルタ ─────────────────────────────────────────────────────────
function filterByPeriod(arts, period){
  const now = Date.now();
  switch(period){
    case '24h'  : return arts.filter(a=>toJST(a.pub_date) >= new Date(now - 86400000));
    case 'today': {
      const jstNow = new Date(now + JST_OFFSET);
      const s = new Date(Date.UTC(jstNow.getUTCFullYear(),jstNow.getUTCMonth(),jstNow.getUTCDate()) - JST_OFFSET);
      return arts.filter(a=>toJST(a.pub_date) >= s);
    }
    case 'week' : return arts.filter(a=>toJST(a.pub_date) >= new Date(now - 7*86400000));
    default     : return arts;
  }
}

// ── 期間タブ切替 ─────────────────────────────────────────────────────────
function setPeriod(period){
  currentPeriod = period;
  document.querySelectorAll('[data-period]').forEach(t=>{
    t.classList.toggle('active', t.dataset.period === period);
  });
  render();
}

// ── ソースチップ生成 ─────────────────────────────────────────────────────
function buildSourceChips(sources){
  const area = document.getElementById('sourceChips');
  area.style.display = 'flex';
  area.innerHTML = sources.map(name => {
    const m = sourceMeta(name);
    return `<div class="chip active" data-source="${esc(name)}" onclick="toggleSource('${esc(name)}')" style="color:${m.color}">
      <span class="chip-dot" style="background:${m.color}"></span>${esc(name)}
    </div>`;
  }).join('');
}

function toggleSource(name){
  if(activeSource === name){
    activeSource = null;
  } else {
    activeSource = name;
  }
  document.querySelectorAll('.chip').forEach(c=>{
    const isActive = activeSource === null || c.dataset.source === activeSource;
    c.classList.toggle('active', isActive);
    c.classList.toggle('inactive', !isActive);
  });
  render();
}

// ── HTML エスケープ ──────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

// ── カード生成 ───────────────────────────────────────────────────────────
function buildCard(a){
  const pub  = toJST(a.pub_date);
  const rel  = fmtRel(pub);
  const full = fmtFull(pub);
  const m    = sourceMeta(a.source_name);

  // ダークモードでは背景を暗く
  const badgeBg     = isDark() ? 'rgba(0,0,0,0.25)' : m.bg;
  const badgeBorder = isDark() ? m.color            : m.border;

  return `<div class="card">
    <div class="card-tags">
      <span class="source-badge" style="color:${m.color};background:${badgeBg};border-color:${badgeBorder}">
        ${esc(a.source_name)}
      </span>
      ${a.category ? `<span class="cat-tag">${esc(a.category)}</span>` : ''}
    </div>
    <a class="card-title" href="${esc(a.link)}" target="_blank" rel="noopener">
      ${esc(a.title)}
    </a>
    <div class="card-meta">
      <span title="${full}">${rel}</span>
      <span class="sep">·</span>
      <span>${full}</span>
    </div>
    <div class="card-summary">${esc(a.summary || a.description || '')}</div>
    <a class="read-link" href="${esc(a.link)}" target="_blank" rel="noopener">元記事を読む →</a>
  </div>`;
}

// ── レンダリング ─────────────────────────────────────────────────────────
function render(){
  let arts = filterByPeriod(allArticles, currentPeriod);
  if(activeSource) arts = arts.filter(a=>a.source_name === activeSource);

  const list     = document.getElementById('newsList');
  const countBar = document.getElementById('countBar');
  const periodLabel = {'24h':'過去24時間','today':'今日','week':'今週','all':'すべて'}[currentPeriod];
  const srcLabel = activeSource ? ` ／ ${activeSource}` : '';

  if(arts.length === 0){
    countBar.style.display = 'none';
    list.innerHTML = `<div class="empty">
      <div class="empty-icon">📭</div>
      <div class="empty-ttl">${periodLabel}${srcLabel}のニュースはありません</div>
      <div class="empty-sub">別の期間・ソースを選択するか、しばらく後に再確認してください。</div>
    </div>`;
    return;
  }
  countBar.style.display = 'block';
  countBar.innerHTML = `${periodLabel}${srcLabel}：<strong>${arts.length}件</strong>`;
  list.innerHTML = arts.map(buildCard).join('');
}

// ── データ読み込み ────────────────────────────────────────────────────────
async function loadNews(){
  const btn      = document.getElementById('refreshBtn');
  const icon     = document.getElementById('spinIcon');
  const dot      = document.getElementById('statusDot');
  const statTxt  = document.getElementById('statusText');
  const errArea  = document.getElementById('errorArea');
  const skels    = document.getElementById('skeletons');

  btn.classList.add('loading');
  icon.classList.add('go');
  dot.className  = 'dot loading';
  statTxt.textContent = 'データを取得中...';
  errArea.innerHTML   = '';

  try {
    const res = await fetch(NEWS_JSON + '?t=' + Date.now());
    if(!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
    const db = await res.json();

    allArticles = db.articles || [];
    const total = db.total_count || allArticles.length;
    const lastUpd = db.last_updated ? fmtFull(new Date(db.last_updated)) : '不明';

    skels.style.display = 'none';
    document.getElementById('countBar').style.display = 'block';
    document.getElementById('footer').style.display   = 'block';

    // ソースチップ
    const sources = db.sources || [...new Set(allArticles.map(a=>a.source_name))];
    buildSourceChips(sources);

    // ステータス更新
    dot.className    = 'dot';
    statTxt.textContent = `最終更新: ${lastUpd}　蓄積: ${total}件`;
    document.getElementById('headerSub').textContent = `${sources.length}メディア対応 ／ 蓄積${total}件`;

    // フッター
    document.getElementById('footer').innerHTML = `
      最終データ更新: ${lastUpd}<br>
      参照元: ${sources.map(s=>`<a href="${(SOURCE_META[s]||{}).top||'#'}" target="_blank" rel="noopener">${esc(s)}</a>`).join(' ／ ')}<br>
      <a href="${REPO_URL}" target="_blank" rel="noopener">GitHub</a>　毎朝9:00 JST に自動更新 (GitHub Actions)
    `;

    render();
  } catch(e) {
    skels.style.display = 'none';
    dot.className       = 'dot error';
    statTxt.textContent = 'データの取得に失敗しました';
    errArea.innerHTML   = `<div class="err-card">⚠ データを取得できませんでした: ${esc(e.message)}<br>
      GitHub Actions が初回実行されるまでデータが存在しない場合があります。<br>
      リポジトリの Actions タブから手動実行してください。</div>`;
    document.getElementById('newsList').innerHTML = '';
  }

  btn.classList.remove('loading');
  icon.classList.remove('go');
}

// ── スクロール ───────────────────────────────────────────────────────────
window.addEventListener('scroll',()=>{
  document.getElementById('toTop').classList.toggle('show', scrollY > 300);
},{passive:true});

// ── 起動 ────────────────────────────────────────────────────────────────
loadNews();
</script>
</body>
</html>
